<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with magical sparkles -->
  <circle cx="200" cy="250" r="180" fill="#E8EAF6" opacity="0.4"/>
  
  <!-- Magical sparkles in background -->
  <polygon points="70,120 72,126 78,126 73,130 75,136 70,132 65,136 67,130 62,126 68,126" fill="#FFD54F" opacity="0.6"/>
  <polygon points="330,200 331,204 335,204 332,207 333,211 330,208 327,211 328,207 325,204 329,204" fill="#7E57C2" opacity="0.6"/>
  <polygon points="90,340 91,343 94,343 92,345 93,348 90,346 87,348 88,345 86,343 89,343" fill="#42A5F5" opacity="0.6"/>
  
  <!-- Character body -->
  <g transform="translate(200, 280)">
    <!-- Legs -->
    <rect x="-20" y="70" width="14" height="55" rx="7" fill="#5E35B1"/>
    <rect x="6" y="70" width="14" height="55" rx="7" fill="#5E35B1"/>
    
    <!-- Shoes with stars -->
    <g transform="translate(-13, 125)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#FFD54F"/>
      <polygon points="0,-3 1,-1 3,-1 1,1 2,3 0,2 -2,3 -1,1 -3,-1 -1,-1" fill="#7E57C2"/>
    </g>
    <g transform="translate(13, 125)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#FFD54F"/>
      <polygon points="0,-3 1,-1 3,-1 1,1 2,3 0,2 -2,3 -1,1 -3,-1 -1,-1" fill="#7E57C2"/>
    </g>
    
    <!-- Robe/cloak with stars and moons -->
    <path d="M -35,15 L -40,80 L 40,80 L 35,15 Z" fill="#5E35B1"/>
    <ellipse cx="0" cy="15" rx="35" ry="10" fill="#7E57C2"/>
    
    <!-- Magical symbols on robe -->
    <g opacity="0.7">
      <polygon points="-15,35 -14,38 -11,38 -13,40 -12,43 -15,41 -18,43 -17,40 -19,38 -16,38" fill="#FFD54F"/>
      <circle cx="12" cy="45" r="4" fill="#42A5F5" opacity="0.5"/>
      <path d="M 8,55 Q 12,50 16,55" stroke="#FFD54F" stroke-width="2" fill="none"/>
      <circle cx="-8" cy="60" r="3" fill="#FF6B9D" opacity="0.5"/>
    </g>
    
    <!-- Arms -->
    <rect x="-50" y="22" width="18" height="50" rx="9" fill="#A1887F"/>
    <rect x="32" y="22" width="18" height="50" rx="9" fill="#A1887F"/>
    
    <!-- Hands -->
    <circle cx="-41" cy="72" r="10" fill="#A1887F"/>
    <circle cx="41" cy="72" r="10" fill="#A1887F"/>
    
    <!-- Neck -->
    <rect x="-10" y="2" width="20" height="15" fill="#A1887F"/>
    
    <!-- Head -->
    <circle cx="0" cy="-24" r="38" fill="#A1887F"/>
    
    <!-- Wizard hat - tall and pointy -->
    <g>
      <!-- Hat base/brim -->
      <ellipse cx="0" cy="-55" rx="48" ry="10" fill="#5E35B1"/>
      <!-- Hat cone -->
      <path d="M -35,-55 Q 0,-140 35,-55 Z" fill="#7E57C2"/>
      <!-- Stars on hat -->
      <polygon points="0,-120 2,-115 7,-115 3,-111 5,-106 0,-110 -5,-106 -3,-111 -7,-115 -2,-115" fill="#FFD54F"/>
      <polygon points="-15,-85 -14,-82 -11,-82 -13,-80 -12,-77 -15,-79 -18,-77 -17,-80 -19,-82 -16,-82" fill="#42A5F5" opacity="0.8"/>
      <polygon points="18,-95 19,-92 22,-92 20,-90 21,-87 18,-89 15,-87 16,-90 14,-92 17,-92" fill="#FF6B9D" opacity="0.8"/>
    </g>
    
    <!-- Beard - short and magical -->
    <path d="M -20,-5 Q -15,8 0,10 Q 15,8 20,-5" fill="#BDBDBD"/>
    <circle cx="-12" cy="2" r="5" fill="#BDBDBD"/>
    <circle cx="12" cy="2" r="5" fill="#BDBDBD"/>
    <circle cx="0" cy="8" r="5" fill="#BDBDBD"/>
    
    <!-- Face features -->
    <!-- Eyes - wise and magical -->
    <circle cx="-14" cy="-28" r="7" fill="#ffffff"/>
    <circle cx="14" cy="-28" r="7" fill="#ffffff"/>
    <circle cx="-14" cy="-28" r="5" fill="#7E57C2"/>
    <circle cx="14" cy="-28" r="5" fill="#7E57C2"/>
    <!-- Sparkle in eyes -->
    <polygon points="-14,-30 -13,-28 -11,-28 -12,-26 -12,-24 -14,-25 -16,-24 -16,-26 -17,-28 -15,-28" fill="#ffffff" opacity="0.8"/>
    <polygon points="14,-30 15,-28 17,-28 16,-26 16,-24 14,-25 12,-24 12,-26 11,-28 13,-28" fill="#ffffff" opacity="0.8"/>
    
    <!-- Friendly eyebrows -->
    <path d="M -22,-32 Q -18,-35 -10,-33" stroke="#8D6E63" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 22,-32 Q 18,-35 10,-33" stroke="#8D6E63" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#8D6E63" opacity="0.3"/>
    
    <!-- Smile visible through beard -->
    <path d="M -12,-8 Q 0,-2 12,-8" stroke="#8D6E63" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Magic wand in right hand -->
    <g transform="translate(41, 72) rotate(45)">
      <rect x="-2" y="-35" width="4" height="40" fill="#8D6E63"/>
      <polygon points="-6,-35 6,-35 0,-48" fill="#FFD54F"/>
      <!-- Sparkles from wand -->
      <polygon points="0,-50 1,-48 3,-48 1,-46 2,-44 0,-45 -2,-44 -1,-46 -3,-48 -1,-48" fill="#FFD54F"/>
      <circle cx="-8" cy="-42" r="2" fill="#42A5F5" opacity="0.8"/>
      <circle cx="8" cy="-40" r="2" fill="#FF6B9D" opacity="0.8"/>
    </g>
    
    <!-- Spell book in left hand -->
    <g transform="translate(-41, 62)">
      <rect x="-15" y="-12" width="30" height="24" rx="2" fill="#7E57C2" stroke="#5E35B1" stroke-width="2"/>
      <rect x="-15" y="-12" width="4" height="24" fill="#5E35B1"/>
      <!-- Magical symbols on book -->
      <circle cx="2" cy="0" r="3" fill="#FFD54F" opacity="0.8"/>
      <polygon points="8,-4 9,-2 11,-2 9,0 10,2 8,1 6,2 7,0 5,-2 7,-2" fill="#42A5F5" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Floating magical words -->
  <g fill="#7E57C2" opacity="0.6" font-family="Arial" font-weight="bold">
    <text x="80" y="180" font-size="20">WRITE</text>
    <text x="300" y="260" font-size="18">STORY</text>
    <text x="90" y="320" font-size="16">WORDS</text>
    <text x="310" y="350" font-size="17">FUN</text>
  </g>
  
  <!-- Magic sparkle trail -->
  <path d="M 280,140 Q 260,150 250,170" stroke="#FFD54F" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4,4"/>
  
  <!-- Speech bubble -->
  <g transform="translate(100, 150)">
    <ellipse cx="0" cy="0" rx="68" ry="42" fill="#ffffff" stroke="#7E57C2" stroke-width="3"/>
    <polygon points="35,22 52,42 40,30" fill="#ffffff"/>
    <polygon points="35,22 52,42 40,30" fill="none" stroke="#7E57C2" stroke-width="3"/>
    <text x="0" y="-10" font-family="Arial" font-size="15" font-weight="bold" fill="#7E57C2" text-anchor="middle">
      Words are
    </text>
    <text x="0" y="8" font-family="Arial" font-size="15" font-weight="bold" fill="#7E57C2" text-anchor="middle">
      magical!
    </text>
  </g>
  
  <!-- More sparkles -->
  <polygon points="320,140 322,146 328,146 323,150 325,156 320,152 315,156 317,150 312,146 318,146" fill="#42A5F5" opacity="0.7"/>
  <polygon points="70,250 71,253 74,253 72,255 73,258 70,256 67,258 68,255 66,253 69,253" fill="#FFD54F" opacity="0.7"/>
  
  <!-- Name label -->
  <g transform="translate(200, 460)">
    <rect x="-85" y="-25" width="170" height="50" rx="8" fill="#7E57C2" opacity="0.9"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Word Wizard
    </text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      Vocabulary Master
    </text>
  </g>
</svg>