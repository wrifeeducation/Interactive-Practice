<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#E3F2FD" opacity="0.5"/>
  
  <!-- Character body -->
  <g transform="translate(200, 280)">
    <!-- Legs -->
    <rect x="-25" y="80" width="15" height="50" rx="7" fill="#4A90E2"/>
    <rect x="10" y="80" width="15" height="50" rx="7" fill="#4A90E2"/>
    
    <!-- Shoes -->
    <ellipse cx="-17" cy="130" rx="12" ry="8" fill="#2C3E50"/>
    <ellipse cx="17" cy="130" rx="12" ry="8" fill="#2C3E50"/>
    
    <!-- Body/shirt -->
    <rect x="-35" y="20" width="70" height="65" rx="8" fill="#4A90E2"/>
    
    <!-- Arms -->
    <rect x="-50" y="30" width="18" height="50" rx="9" fill="#FFB74D"/>
    <rect x="32" y="30" width="18" height="50" rx="9" fill="#FFB74D"/>
    
    <!-- Hands -->
    <circle cx="-41" cy="80" r="10" fill="#FFB74D"/>
    <circle cx="41" cy="80" r="10" fill="#FFB74D"/>
    
    <!-- Neck -->
    <rect x="-12" y="5" width="24" height="18" fill="#FFB74D"/>
    
    <!-- Head -->
    <circle cx="0" cy="-20" r="45" fill="#FFB74D"/>
    
    <!-- Hair -->
    <path d="M -45,-20 Q -48,-40 -35,-50 Q -20,-55 0,-52 Q 20,-55 35,-50 Q 48,-40 45,-20" fill="#2C3E50"/>
    
    <!-- Face features -->
    <!-- Eyes -->
    <circle cx="-15" cy="-25" r="5" fill="#2C3E50"/>
    <circle cx="15" cy="-25" r="5" fill="#2C3E50"/>
    <circle cx="-13" cy="-26" r="2" fill="#ffffff"/>
    <circle cx="17" cy="-26" r="2" fill="#ffffff"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-15" rx="3" ry="4" fill="#FF9800" opacity="0.3"/>
    
    <!-- Big happy smile -->
    <path d="M -18,-5 Q 0,8 18,-5" stroke="#2C3E50" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Rosy cheeks -->
    <circle cx="-25" cy="-10" r="8" fill="#FF5252" opacity="0.3"/>
    <circle cx="25" cy="-10" r="8" fill="#FF5252" opacity="0.3"/>
    
    <!-- Giant pencil in left hand -->
    <g transform="translate(-41, 80)">
      <rect x="-8" y="-50" width="16" height="60" rx="3" fill="#FFD54F"/>
      <polygon points="-8,-50 8,-50 0,-65" fill="#FF9800"/>
      <rect x="-8" y="5" width="16" height="8" fill="#FF9800"/>
      <circle cx="0" cy="0" r="4" fill="#2C3E50"/>
    </g>
    
    <!-- Notebook in right hand -->
    <g transform="translate(41, 70)">
      <rect x="-15" y="-25" width="30" height="40" rx="3" fill="#ffffff" stroke="#4A90E2" stroke-width="3"/>
      <!-- Lines on notebook -->
      <line x1="-10" y1="-15" x2="10" y2="-15" stroke="#4A90E2" stroke-width="1.5"/>
      <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#4A90E2" stroke-width="1.5"/>
      <line x1="-10" y1="-1" x2="10" y2="-1" stroke="#4A90E2" stroke-width="1.5"/>
      <line x1="-10" y1="6" x2="10" y2="6" stroke="#4A90E2" stroke-width="1.5"/>
      <!-- Star sticker on notebook -->
      <polygon points="0,-20 2,-16 6,-16 3,-13 4,-9 0,-12 -4,-9 -3,-13 -6,-16 -2,-16" fill="#FFD54F"/>
    </g>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(100, 120)">
    <ellipse cx="0" cy="0" rx="70" ry="40" fill="#ffffff" stroke="#4A90E2" stroke-width="3"/>
    <polygon points="-30,25 -35,45 -20,30" fill="#ffffff"/>
    <polygon points="-30,25 -35,45 -20,30" fill="none" stroke="#4A90E2" stroke-width="3"/>
    <text x="0" y="-8" font-family="Arial" font-size="18" font-weight="bold" fill="#4A90E2" text-anchor="middle">
      Let's write
    </text>
    <text x="0" y="12" font-family="Arial" font-size="18" font-weight="bold" fill="#4A90E2" text-anchor="middle">
      together!
    </text>
  </g>
  
  <!-- Floating elements for fun -->
  <!-- Stars -->
  <polygon points="70,100 72,105 77,105 73,109 75,114 70,111 65,114 67,109 63,105 68,105" fill="#FFD54F" opacity="0.7"/>
  <polygon points="330,200 332,205 337,205 333,209 335,214 330,211 325,214 327,209 323,205 328,205" fill="#FFD54F" opacity="0.7"/>
  <polygon points="320,80 321,83 324,83 322,85 323,88 320,86 317,88 318,85 316,83 319,83" fill="#4CAF50" opacity="0.6"/>
  <polygon points="80,250 81,253 84,253 82,255 83,258 80,256 77,258 78,255 76,253 79,253" fill="#FF9800" opacity="0.6"/>
  
  <!-- Small hearts -->
  <path d="M 340,140 Q 336,135 332,137 Q 330,140 332,143 L 340,150 L 348,143 Q 350,140 348,137 Q 344,135 340,140 Z" fill="#FF5252" opacity="0.5"/>
  <path d="M 60,180 Q 57,176 54,178 Q 52,180 54,183 L 60,188 L 66,183 Q 68,180 66,178 Q 63,176 60,180 Z" fill="#FF5252" opacity="0.5"/>
  
  <!-- Text at bottom -->
  <text x="200" y="460" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50" text-anchor="middle">
    Your WriFe Friend!
  </text>
  <text x="200" y="485" font-family="Arial, sans-serif" font-size="16" fill="#4A90E2" text-anchor="middle">
    Ready to start your writing adventure?
  </text>
</svg>