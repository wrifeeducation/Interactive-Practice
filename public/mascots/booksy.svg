<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#E3F2FD" opacity="0.4"/>
  
  <!-- Character body -->
  <g transform="translate(200, 280)">
    <!-- Legs -->
    <rect x="-22" y="75" width="15" height="50" rx="7" fill="#1976D2"/>
    <rect x="7" y="75" width="15" height="50" rx="7" fill="#1976D2"/>
    
    <!-- Shoes -->
    <ellipse cx="-14" cy="125" rx="13" ry="8" fill="#0D47A1"/>
    <ellipse cx="14" cy="125" rx="13" ry="8" fill="#0D47A1"/>
    
    <!-- Body/sweater with book pattern -->
    <rect x="-32" y="20" width="64" height="60" rx="8" fill="#1976D2"/>
    <!-- Book icon on sweater -->
    <g transform="translate(0, 40)">
      <rect x="-12" y="-10" width="24" height="18" rx="2" fill="#FFD54F"/>
      <line x1="-12" y1="-10" x2="-12" y2="8" stroke="#FF9800" stroke-width="2"/>
      <line x1="0" y1="-10" x2="0" y2="8" stroke="#FF9800" stroke-width="1"/>
    </g>
    
    <!-- Arms -->
    <rect x="-48" y="28" width="18" height="50" rx="9" fill="#8D6E63"/>
    <rect x="30" y="28" width="18" height="50" rx="9" fill="#8D6E63"/>
    
    <!-- Hands -->
    <circle cx="-39" cy="78" r="10" fill="#8D6E63"/>
    <circle cx="39" cy="78" r="10" fill="#8D6E63"/>
    
    <!-- Neck -->
    <rect x="-11" y="5" width="22" height="17" fill="#8D6E63"/>
    
    <!-- Head -->
    <circle cx="0" cy="-18" r="42" fill="#8D6E63"/>
    
    <!-- Hair - neat and bookish -->
    <ellipse cx="0" cy="-42" rx="44" ry="28" fill="#3E2723"/>
    <rect x="-44" y="-42" width="88" height="30" fill="#3E2723"/>
    <!-- Side hair -->
    <ellipse cx="-25" cy="-25" rx="20" ry="30" fill="#3E2723"/>
    <ellipse cx="25" cy="-25" rx="20" ry="30" fill="#3E2723"/>
    
    <!-- Glasses - signature feature -->
    <g>
      <!-- Frames -->
      <circle cx="-15" cy="-22" r="11" fill="none" stroke="#2C3E50" stroke-width="3"/>
      <circle cx="15" cy="-22" r="11" fill="none" stroke="#2C3E50" stroke-width="3"/>
      <circle cx="-15" cy="-22" r="10" fill="#ffffff" opacity="0.3"/>
      <circle cx="15" cy="-22" r="10" fill="#ffffff" opacity="0.3"/>
      <!-- Bridge -->
      <line x1="-4" y1="-22" x2="4" y2="-22" stroke="#2C3E50" stroke-width="3"/>
      <!-- Temples -->
      <line x1="-26" y1="-22" x2="-35" y2="-22" stroke="#2C3E50" stroke-width="3"/>
      <line x1="26" y1="-22" x2="35" y2="-22" stroke="#2C3E50" stroke-width="3"/>
    </g>
    
    <!-- Eyes behind glasses -->
    <circle cx="-15" cy="-23" r="5" fill="#2C3E50"/>
    <circle cx="15" cy="-23" r="5" fill="#2C3E50"/>
    <circle cx="-13" cy="-24" r="2" fill="#ffffff"/>
    <circle cx="17" cy="-24" r="2" fill="#ffffff"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-12" rx="3" ry="5" fill="#6D4C41" opacity="0.3"/>
    
    <!-- Friendly smile -->
    <path d="M -14,-2 Q 0,4 14,-2" stroke="#2C3E50" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Rosy cheeks -->
    <circle cx="-25" cy="-8" r="8" fill="#FF9800" opacity="0.3"/>
    <circle cx="25" cy="-8" r="8" fill="#FF9800" opacity="0.3"/>
    
    <!-- Large book being held - both hands -->
    <g transform="translate(0, 90)">
      <!-- Book -->
      <rect x="-45" y="-30" width="90" height="50" rx="4" fill="#FF9800" stroke="#E65100" stroke-width="3"/>
      <!-- Book spine -->
      <rect x="-45" y="-30" width="10" height="50" fill="#E65100"/>
      <!-- Pages -->
      <rect x="-42" y="-27" width="80" height="44" fill="#FFF8E1"/>
      <!-- Text lines on pages -->
      <line x1="-38" y1="-20" x2="-5" y2="-20" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="-38" y1="-12" x2="-5" y2="-12" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="-38" y1="-4" x2="-5" y2="-4" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="-38" y1="4" x2="-10" y2="4" stroke="#1976D2" stroke-width="1.5"/>
      
      <line x1="5" y1="-20" x2="30" y2="-20" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="5" y1="-12" x2="30" y2="-12" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="5" y1="-4" x2="30" y2="-4" stroke="#1976D2" stroke-width="1.5"/>
      <line x1="5" y1="4" x2="25" y2="4" stroke="#1976D2" stroke-width="1.5"/>
      
      <!-- Book title on cover -->
      <text x="-20" y="12" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle" transform="rotate(-90 -20 12)">
        STORIES
      </text>
    </g>
    
    <!-- Small bookmark sticking out -->
    <rect x="32" y="52" width="6" height="20" fill="#FF1744"/>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(100, 140)">
    <ellipse cx="0" cy="0" rx="65" ry="38" fill="#ffffff" stroke="#1976D2" stroke-width="3"/>
    <polygon points="30,25 45,45 35,30" fill="#ffffff"/>
    <polygon points="30,25 45,45 35,30" fill="none" stroke="#1976D2" stroke-width="3"/>
    <text x="0" y="-8" font-family="Arial" font-size="15" font-weight="bold" fill="#1976D2" text-anchor="middle">
      Every story
    </text>
    <text x="0" y="8" font-family="Arial" font-size="15" font-weight="bold" fill="#1976D2" text-anchor="middle">
      is special!
    </text>
  </g>
  
  <!-- Floating books around -->
  <g transform="translate(320, 180)">
    <rect x="0" y="0" width="25" height="35" rx="2" fill="#4CAF50" transform="rotate(15)"/>
    <rect x="0" y="2" width="3" height="35" fill="#2E7D32" transform="rotate(15)"/>
  </g>
  
  <g transform="translate(90, 350)">
    <rect x="0" y="0" width="30" height="40" rx="2" fill="#FF6B9D" transform="rotate(-20)"/>
    <rect x="0" y="2" width="4" height="40" fill="#C2185B" transform="rotate(-20)"/>
  </g>
  
  <!-- Stars -->
  <polygon points="340,280 341,284 345,284 342,287 343,291 340,288 337,291 338,287 335,284 339,284" fill="#FFD54F" opacity="0.7"/>
  
  <!-- Name label -->
  <g transform="translate(200, 460)">
    <rect x="-70" y="-25" width="140" height="50" rx="8" fill="#1976D2" opacity="0.9"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Booksy
    </text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      The Story Keeper
    </text>
  </g>
</svg>