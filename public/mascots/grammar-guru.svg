<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#E8F5E9" opacity="0.4"/>
  
  <!-- Owl body -->
  <g transform="translate(200, 270)">
    <!-- Body - main oval -->
    <ellipse cx="0" cy="20" rx="70" ry="90" fill="#8D6E63"/>
    <ellipse cx="0" cy="20" rx="55" ry="75" fill="#A1887F"/>
    
    <!-- Wing left -->
    <ellipse cx="-50" cy="30" rx="30" ry="60" fill="#6D4C41" transform="rotate(-20 -50 30)"/>
    <ellipse cx="-48" cy="30" rx="20" ry="50" fill="#8D6E63" transform="rotate(-20 -48 30)"/>
    
    <!-- Wing right -->
    <ellipse cx="50" cy="30" rx="30" ry="60" fill="#6D4C41" transform="rotate(20 50 30)"/>
    <ellipse cx="48" cy="30" rx="20" ry="50" fill="#8D6E63" transform="rotate(20 48 30)"/>
    
    <!-- Feet/talons -->
    <g transform="translate(-20, 100)">
      <ellipse cx="0" cy="0" rx="15" ry="10" fill="#FF9800"/>
      <!-- Three toes -->
      <line x1="-8" y1="8" x2="-12" y2="18" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
      <line x1="8" y1="8" x2="12" y2="18" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <g transform="translate(20, 100)">
      <ellipse cx="0" cy="0" rx="15" ry="10" fill="#FF9800"/>
      <!-- Three toes -->
      <line x1="-8" y1="8" x2="-12" y2="18" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
      <line x1="8" y1="8" x2="12" y2="18" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Head - large circle -->
    <circle cx="0" cy="-50" r="65" fill="#8D6E63"/>
    
    <!-- Ear tufts -->
    <ellipse cx="-35" cy="-85" rx="12" ry="30" fill="#6D4C41" transform="rotate(-25 -35 -85)"/>
    <ellipse cx="35" cy="-85" rx="12" ry="30" fill="#6D4C41" transform="rotate(25 35 -85)"/>
    
    <!-- Face disc -->
    <ellipse cx="0" cy="-45" rx="55" ry="60" fill="#A1887F"/>
    <ellipse cx="0" cy="-45" rx="48" ry="53" fill="#D7CCC8"/>
    
    <!-- Eyes - HUGE wise eyes -->
    <circle cx="-20" cy="-50" r="22" fill="#ffffff"/>
    <circle cx="20" cy="-50" r="22" fill="#ffffff"/>
    <circle cx="-20" cy="-50" r="18" fill="#FFD54F"/>
    <circle cx="20" cy="-50" r="18" fill="#FFD54F"/>
    <circle cx="-20" cy="-50" r="12" fill="#2C3E50"/>
    <circle cx="20" cy="-50" r="12" fill="#2C3E50"/>
    <circle cx="-17" cy="-53" r="5" fill="#ffffff"/>
    <circle cx="23" cy="-53" r="5" fill="#ffffff"/>
    
    <!-- Wise eyebrows -->
    <path d="M -38,-65 Q -30,-70 -10,-68" stroke="#6D4C41" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 38,-65 Q 30,-70 10,-68" stroke="#6D4C41" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Beak -->
    <path d="M 0,-30 L -8,-20 L 0,-15 L 8,-20 Z" fill="#FF9800"/>
    <path d="M 0,-15 L -6,-10 L 0,-8 L 6,-10 Z" fill="#F57C00"/>
    
    <!-- Graduation cap (because wise!) -->
    <g transform="translate(0, -110)">
      <rect x="-40" y="0" width="80" height="8" rx="2" fill="#4CAF50"/>
      <rect x="-25" y="-18" width="50" height="18" fill="#4CAF50"/>
      <!-- Tassel -->
      <line x1="25" y1="0" x2="35" y2="-15" stroke="#FFD54F" stroke-width="3"/>
      <circle cx="35" cy="-15" r="5" fill="#FFD54F"/>
      <line x1="35" y1="-10" x2="35" y2="0" stroke="#FFD54F" stroke-width="2"/>
      <line x1="32" y1="0" x2="38" y2="0" stroke="#FFD54F" stroke-width="2"/>
    </g>
    
    <!-- Small chalkboard with grammar symbol -->
    <g transform="translate(-50, -20) rotate(-15)">
      <rect x="0" y="0" width="35" height="30" rx="2" fill="#2C3E50" stroke="#8D6E63" stroke-width="3"/>
      <!-- ABC on board -->
      <text x="17" y="12" font-family="Arial" font-size="10" font-weight="bold" fill="#4CAF50" text-anchor="middle">
        ABC
      </text>
      <text x="17" y="23" font-family="Arial" font-size="8" font-weight="bold" fill="#FFD54F" text-anchor="middle">
        123
      </text>
    </g>
    
    <!-- Book under wing -->
    <g transform="translate(45, 10)">
      <rect x="0" y="0" width="20" height="28" rx="2" fill="#FF6B9D" stroke="#C2185B" stroke-width="2"/>
      <rect x="0" y="0" width="3" height="28" fill="#C2185B"/>
    </g>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(310, 200)">
    <ellipse cx="0" cy="0" rx="60" ry="40" fill="#ffffff" stroke="#4CAF50" stroke-width="3"/>
    <polygon points="-30,20 -45,40 -20,28" fill="#ffffff"/>
    <polygon points="-30,20 -45,40 -20,28" fill="none" stroke="#4CAF50" stroke-width="3"/>
    <text x="0" y="-8" font-family="Arial" font-size="14" font-weight="bold" fill="#4CAF50" text-anchor="middle">
      Grammar is
    </text>
    <text x="0" y="8" font-family="Arial" font-size="14" font-weight="bold" fill="#4CAF50" text-anchor="middle">
      your friend!
    </text>
  </g>
  
  <!-- Floating letters -->
  <text x="80" y="150" font-family="Arial" font-size="32" font-weight="bold" fill="#4CAF50" opacity="0.4">A</text>
  <text x="330" y="320" font-family="Arial" font-size="28" font-weight="bold" fill="#FF9800" opacity="0.4">B</text>
  <text x="90" y="380" font-family="Arial" font-size="30" font-weight="bold" fill="#1976D2" opacity="0.4">C</text>
  
  <!-- Stars -->
  <polygon points="340,380 341,384 345,384 342,387 343,391 340,388 337,391 338,387 335,384 339,384" fill="#FFD54F" opacity="0.7"/>
  
  <!-- Name label -->
  <g transform="translate(200, 460)">
    <rect x="-85" y="-25" width="170" height="50" rx="8" fill="#4CAF50" opacity="0.9"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Grammar Guru
    </text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      The Wise Owl
    </text>
  </g>
</svg>