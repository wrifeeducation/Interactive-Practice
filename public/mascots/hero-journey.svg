<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#skyGradient)"/>
  
  <!-- Decorative clouds -->
  <ellipse cx="150" cy="80" rx="50" ry="30" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="180" cy="85" rx="40" ry="25" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="1000" cy="100" rx="60" ry="35" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="1040" cy="105" rx="50" ry="30" fill="#ffffff" opacity="0.7"/>
  
  <!-- Title Text -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2C3E50" text-anchor="middle">
    Your Writing Journey Starts Here!
  </text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="24" fill="#4A90E2" text-anchor="middle">
    From First Story to Confident Writer
  </text>
  
  <!-- Curved path representing the journey -->
  <path d="M 100 450 Q 300 350, 500 400 Q 700 450, 900 350 Q 1000 300, 1100 350" 
        stroke="#FFD54F" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8"/>
  
  <!-- START - Child with pencil (Lesson 1) -->
  <g transform="translate(100, 380)">
    <!-- Circle base -->
    <circle cx="0" cy="0" r="50" fill="#4A90E2" opacity="0.2"/>
    <circle cx="0" cy="0" r="40" fill="#ffffff" stroke="#4A90E2" stroke-width="4"/>
    
    <!-- Child figure -->
    <circle cx="0" cy="-8" r="18" fill="#FFB74D"/> <!-- head -->
    <rect x="-12" y="10" width="24" height="30" rx="3" fill="#4A90E2"/> <!-- body -->
    <rect x="-18" y="15" width="8" height="20" rx="2" fill="#4A90E2"/> <!-- left arm -->
    <rect x="10" y="15" width="8" height="20" rx="2" fill="#4A90E2"/> <!-- right arm -->
    
    <!-- Pencil in hand -->
    <rect x="14" y="30" width="6" height="25" fill="#FFD54F" transform="rotate(45 17 42)"/>
    <polygon points="14,28 20,28 17,22" fill="#FF9800" transform="rotate(45 17 25)"/>
    
    <!-- Label -->
    <text x="0" y="80" font-family="Arial" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle">START</text>
    <text x="0" y="100" font-family="Arial" font-size="14" fill="#4A90E2" text-anchor="middle">Lesson 1</text>
  </g>
  
  <!-- MIDDLE - Child with notebook (Lesson 30) -->
  <g transform="translate(600, 370)">
    <!-- Circle base -->
    <circle cx="0" cy="0" r="55" fill="#4CAF50" opacity="0.2"/>
    <circle cx="0" cy="0" r="45" fill="#ffffff" stroke="#4CAF50" stroke-width="4"/>
    
    <!-- Child figure - slightly bigger and more confident -->
    <circle cx="0" cy="-10" r="20" fill="#FFB74D"/> <!-- head -->
    <rect x="-14" y="10" width="28" height="35" rx="3" fill="#4CAF50"/> <!-- body -->
    <rect x="-20" y="15" width="9" height="22" rx="2" fill="#4CAF50"/> <!-- left arm -->
    <rect x="11" y="15" width="9" height="22" rx="2" fill="#4CAF50"/> <!-- right arm -->
    
    <!-- Book/notebook -->
    <rect x="-8" y="35" width="16" height="20" fill="#FFD54F" stroke="#2C3E50" stroke-width="2"/>
    <line x1="-8" y1="40" x2="8" y2="40" stroke="#2C3E50" stroke-width="1"/>
    <line x1="-8" y1="45" x2="8" y2="45" stroke="#2C3E50" stroke-width="1"/>
    <line x1="-8" y1="50" x2="8" y2="50" stroke="#2C3E50" stroke-width="1"/>
    
    <!-- Happy smile -->
    <path d="M -6,-10 Q 0,-6 6,-10" stroke="#2C3E50" stroke-width="2" fill="none"/>
    
    <!-- Label -->
    <text x="0" y="90" font-family="Arial" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle">PRACTICING</text>
    <text x="0" y="110" font-family="Arial" font-size="14" fill="#4CAF50" text-anchor="middle">Lesson 30</text>
  </g>
  
  <!-- END - Child with trophy (Lesson 67) -->
  <g transform="translate(1100, 280)">
    <!-- Circle base with shine -->
    <circle cx="0" cy="0" r="60" fill="#FFD54F" opacity="0.3"/>
    <circle cx="0" cy="0" r="50" fill="#ffffff" stroke="#FFD54F" stroke-width="5"/>
    
    <!-- Confident child figure - tallest -->
    <circle cx="0" cy="-12" r="22" fill="#FFB74D"/> <!-- head -->
    <rect x="-16" y="10" width="32" height="40" rx="3" fill="#FFD54F"/> <!-- body -->
    <rect x="-22" y="15" width="10" height="25" rx="2" fill="#FFD54F"/> <!-- left arm -->
    <rect x="12" y="15" width="10" height="25" rx="2" fill="#FFD54F"/> <!-- right arm -->
    
    <!-- Trophy in hands -->
    <ellipse cx="0" cy="50" rx="10" ry="8" fill="#FFD54F"/>
    <rect x="-8" y="38" width="16" height="15" rx="2" fill="#FFD54F" stroke="#FF9800" stroke-width="2"/>
    <rect x="-3" y="50" width="6" height="8" fill="#FFD54F"/>
    <rect x="-8" y="58" width="16" height="4" rx="1" fill="#FFD54F"/>
    <!-- Star on trophy -->
    <polygon points="0,42 2,46 6,46 3,49 4,53 0,50 -4,53 -3,49 -6,46 -2,46" fill="#FF9800"/>
    
    <!-- Big smile and eyes -->
    <circle cx="-6" cy="-14" r="2" fill="#2C3E50"/>
    <circle cx="6" cy="-14" r="2" fill="#2C3E50"/>
    <path d="M -8,-8 Q 0,-2 8,-8" stroke="#2C3E50" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Stars around -->
    <polygon points="40,0 42,6 48,6 43,10 45,16 40,12 35,16 37,10 32,6 38,6" fill="#FFD54F" opacity="0.8"/>
    <polygon points="-40,-10 -38,-4 -32,-4 -37,0 -35,6 -40,2 -45,6 -43,0 -48,-4 -42,-4" fill="#FFD54F" opacity="0.8"/>
    
    <!-- Label -->
    <text x="0" y="100" font-family="Arial" font-size="18" font-weight="bold" fill="#2C3E50" text-anchor="middle">MASTER WRITER!</text>
    <text x="0" y="120" font-family="Arial" font-size="14" fill="#FFD54F" text-anchor="middle">Lesson 67</text>
  </g>
  
  <!-- Milestone markers along path -->
  <!-- Lesson 10 -->
  <circle cx="300" cy="350" r="15" fill="#4A90E2" opacity="0.5"/>
  <text x="300" y="355" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">10</text>
  
  <!-- Lesson 20 -->
  <circle cx="500" cy="400" r="15" fill="#4A90E2" opacity="0.5"/>
  <text x="500" y="405" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">20</text>
  
  <!-- Lesson 40 -->
  <circle cx="700" cy="450" r="15" fill="#4A90E2" opacity="0.5"/>
  <text x="700" y="455" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">40</text>
  
  <!-- Lesson 50 -->
  <circle cx="900" cy="350" r="15" fill="#4A90E2" opacity="0.5"/>
  <text x="900" y="355" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">50</text>
  
  <!-- Bottom text -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="20" fill="#4A90E2" text-anchor="middle" font-weight="600">
    67 Fun Lessons • Personal Stories • Practice Every Day • Build Confidence!
  </text>
</svg>