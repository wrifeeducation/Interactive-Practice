<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#FFE0F0" opacity="0.3"/>
  
  <!-- Character body -->
  <g transform="translate(200, 280)">
    <!-- Legs -->
    <rect x="-20" y="80" width="14" height="50" rx="7" fill="#FF6B9D"/>
    <rect x="6" y="80" width="14" height="50" rx="7" fill="#FF6B9D"/>
    
    <!-- Shoes with pencil pattern -->
    <ellipse cx="-13" cy="130" rx="12" ry="8" fill="#FFD54F"/>
    <ellipse cx="13" cy="130" rx="12" ry="8" fill="#FFD54F"/>
    
    <!-- Body/dress -->
    <path d="M -30,20 L -35,85 L 35,85 L 30,20 Z" fill="#FF6B9D"/>
    <ellipse cx="0" cy="20" rx="30" ry="8" fill="#FF1744"/>
    
    <!-- Pencil pattern on dress -->
    <g opacity="0.3">
      <rect x="-15" y="40" width="4" height="15" fill="#FFD54F"/>
      <rect x="11" y="55" width="4" height="15" fill="#FFD54F"/>
      <rect x="-5" y="65" width="4" height="15" fill="#FFD54F"/>
    </g>
    
    <!-- Arms -->
    <rect x="-45" y="30" width="16" height="45" rx="8" fill="#C77B5C"/>
    <rect x="29" y="30" width="16" height="45" rx="8" fill="#C77B5C"/>
    
    <!-- Hands -->
    <circle cx="-37" cy="75" r="9" fill="#C77B5C"/>
    <circle cx="37" cy="75" r="9" fill="#C77B5C"/>
    
    <!-- Neck -->
    <rect x="-10" y="5" width="20" height="16" fill="#C77B5C"/>
    
    <!-- Head -->
    <circle cx="0" cy="-20" r="40" fill="#C77B5C"/>
    
    <!-- Hair with pencil bow -->
    <!-- Hair -->
    <ellipse cx="0" cy="-45" rx="42" ry="30" fill="#2C3E50"/>
    <ellipse cx="-20" cy="-30" rx="25" ry="35" fill="#2C3E50"/>
    <ellipse cx="20" cy="-30" rx="25" ry="35" fill="#2C3E50"/>
    
    <!-- Pencil bow on top -->
    <g transform="translate(0, -55)">
      <!-- Bow loops -->
      <ellipse cx="-15" cy="0" rx="12" ry="18" fill="#FFD54F"/>
      <ellipse cx="15" cy="0" rx="12" ry="18" fill="#FFD54F"/>
      <!-- Center -->
      <circle cx="0" cy="0" r="8" fill="#FF9800"/>
      <!-- Pencil point in center -->
      <polygon points="0,-3 3,3 -3,3" fill="#FF1744"/>
    </g>
    
    <!-- Face features -->
    <!-- Eyes - big and sparkly -->
    <ellipse cx="-12" cy="-25" rx="7" ry="9" fill="#2C3E50"/>
    <ellipse cx="12" cy="-25" rx="7" ry="9" fill="#2C3E50"/>
    <circle cx="-10" cy="-27" r="3" fill="#ffffff"/>
    <circle cx="14" cy="-27" r="3" fill="#ffffff"/>
    <circle cx="-8" cy="-24" r="1.5" fill="#ffffff"/>
    <circle cx="16" cy="-24" r="1.5" fill="#ffffff"/>
    
    <!-- Eyelashes -->
    <line x1="-18" y1="-28" x2="-20" y2="-30" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <line x1="-17" y1="-32" x2="-18" y2="-35" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="-28" x2="20" y2="-30" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="-32" x2="18" y2="-35" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-15" rx="3" ry="4" fill="#A0522D" opacity="0.3"/>
    
    <!-- Big happy smile -->
    <path d="M -15,-5 Q 0,6 15,-5" stroke="#2C3E50" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Rosy cheeks -->
    <circle cx="-22" cy="-10" r="7" fill="#FF6B9D" opacity="0.4"/>
    <circle cx="22" cy="-10" r="7" fill="#FF6B9D" opacity="0.4"/>
    
    <!-- Giant pencil in hand - signature item -->
    <g transform="translate(-37, 75) rotate(-25)">
      <rect x="-10" y="-70" width="20" height="80" rx="4" fill="#FFD54F"/>
      <polygon points="-10,-70 10,-70 0,-88" fill="#FF9800"/>
      <rect x="-10" y="5" width="20" height="10" fill="#FF1744"/>
      <rect x="-10" y="-5" width="20" height="8" fill="#2C3E50"/>
      <circle cx="0" cy="0" r="5" fill="#FFE082"/>
      <!-- Eraser -->
      <rect x="-10" y="15" width="20" height="8" rx="2" fill="#FF6B9D"/>
    </g>
    
    <!-- Small notebook in other hand -->
    <g transform="translate(37, 65)">
      <rect x="-12" y="-18" width="24" height="30" rx="2" fill="#ffffff" stroke="#FF6B9D" stroke-width="2"/>
      <line x1="-8" y1="-10" x2="8" y2="-10" stroke="#FF6B9D" stroke-width="1"/>
      <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#FF6B9D" stroke-width="1"/>
      <line x1="-8" y1="4" x2="8" y2="4" stroke="#FF6B9D" stroke-width="1"/>
      <!-- Heart on notebook -->
      <path d="M 0,-14 Q -4,-18 -7,-15 Q -8,-12 -7,-10 L 0,-4 L 7,-10 Q 8,-12 7,-15 Q 4,-18 0,-14 Z" fill="#FF1744"/>
    </g>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(320, 150)">
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="#ffffff" stroke="#FF6B9D" stroke-width="3"/>
    <polygon points="-25,20 -35,40 -15,25" fill="#ffffff"/>
    <polygon points="-25,20 -35,40 -15,25" fill="none" stroke="#FF6B9D" stroke-width="3"/>
    <text x="0" y="-5" font-family="Arial" font-size="14" font-weight="bold" fill="#FF6B9D" text-anchor="middle">
      Let's write
    </text>
    <text x="0" y="10" font-family="Arial" font-size="14" font-weight="bold" fill="#FF6B9D" text-anchor="middle">
      amazing stories!
    </text>
  </g>
  
  <!-- Sparkles around -->
  <polygon points="80,120 81,124 85,124 82,127 83,131 80,128 77,131 78,127 75,124 79,124" fill="#FFD54F" opacity="0.8"/>
  <polygon points="340,240 341,244 345,244 342,247 343,251 340,248 337,251 338,247 335,244 339,244" fill="#FF6B9D" opacity="0.8"/>
  <polygon points="70,280 71,283 74,283 72,285 73,288 70,286 67,288 68,285 66,283 69,283" fill="#FFD54F" opacity="0.7"/>
  
  <!-- Name label -->
  <g transform="translate(200, 460)">
    <rect x="-80" y="-25" width="160" height="50" rx="8" fill="#FF6B9D" opacity="0.9"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Penny Pencil
    </text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      Your Writing Guide!
    </text>
  </g>
</svg>