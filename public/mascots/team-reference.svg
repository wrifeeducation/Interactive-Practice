<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F5F7FA"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2C3E50" text-anchor="middle">
    The WriFe Mascot Team
  </text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="22" fill="#4A90E2" text-anchor="middle">
    6 Friends to Make Writing Fun!
  </text>
  
  <!-- Row 1: Penny, Booksy, Grammar Guru -->
  
  <!-- Penny Pencil -->
  <g transform="translate(150, 220)">
    <circle cx="0" cy="0" r="80" fill="#FFE0F0" opacity="0.4"/>
    <circle cx="0" cy="-30" r="35" fill="#C77B5C"/>
    <ellipse cx="0" cy="-50" rx="38" ry="25" fill="#2C3E50"/>
    <circle cx="-12" cy="-33" r="5" fill="#2C3E50"/>
    <circle cx="12" cy="-33" r="5" fill="#2C3E50"/>
    <path d="M -12,-20 Q 0,-12 12,-20" stroke="#2C3E50" stroke-width="2" fill="none"/>
    <rect x="-25" y="5" width="50" height="50" fill="#FF6B9D" rx="5"/>
    <g transform="translate(30, 30) rotate(30)">
      <rect x="-3" y="-25" width="6" height="35" fill="#FFD54F"/>
      <polygon points="-3,-25 3,-25 0,-32" fill="#FF9800"/>
    </g>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#FF6B9D" text-anchor="middle">Penny Pencil</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">Your Writing Guide</text>
  </g>
  
  <!-- Booksy -->
  <g transform="translate(400, 220)">
    <circle cx="0" cy="0" r="80" fill="#E3F2FD" opacity="0.4"/>
    <circle cx="0" cy="-30" r="35" fill="#8D6E63"/>
    <ellipse cx="0" cy="-48" rx="38" ry="20" fill="#3E2723"/>
    <circle cx="-12" cy="-33" r="8" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="12" cy="-33" r="8" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="-12" cy="-33" r="3" fill="#2C3E50"/>
    <circle cx="12" cy="-33" r="3" fill="#2C3E50"/>
    <path d="M -12,-20 Q 0,-14 12,-20" stroke="#2C3E50" stroke-width="2" fill="none"/>
    <rect x="-25" y="5" width="50" height="50" fill="#1976D2" rx="5"/>
    <g transform="translate(0, 50)">
      <rect x="-30" y="-15" width="60" height="30" fill="#FF9800" rx="2"/>
      <rect x="-30" y="-15" width="6" height="30" fill="#E65100"/>
    </g>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#1976D2" text-anchor="middle">Booksy</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">The Story Keeper</text>
  </g>
  
  <!-- Grammar Guru (Owl) -->
  <g transform="translate(650, 220)">
    <circle cx="0" cy="0" r="80" fill="#E8F5E9" opacity="0.4"/>
    <ellipse cx="0" cy="10" rx="40" ry="50" fill="#8D6E63"/>
    <circle cx="0" cy="-30" r="40" fill="#8D6E63"/>
    <ellipse cx="-20" cy="-55" rx="8" ry="20" fill="#6D4C41" transform="rotate(-20 -20 -55)"/>
    <ellipse cx="20" cy="-55" rx="8" ry="20" fill="#6D4C41" transform="rotate(20 20 -55)"/>
    <circle cx="-15" cy="-33" r="15" fill="#ffffff"/>
    <circle cx="15" cy="-33" r="15" fill="#ffffff"/>
    <circle cx="-15" cy="-33" r="10" fill="#FFD54F"/>
    <circle cx="15" cy="-33" r="10" fill="#FFD54F"/>
    <circle cx="-15" cy="-33" r="6" fill="#2C3E50"/>
    <circle cx="15" cy="-33" r="6" fill="#2C3E50"/>
    <path d="M 0,-18 L -5,-10 L 0,-7 L 5,-10 Z" fill="#FF9800"/>
    <g transform="translate(0, -65)">
      <rect x="-25" y="0" width="50" height="5" fill="#4CAF50" rx="2"/>
      <rect x="-15" y="-12" width="30" height="12" fill="#4CAF50"/>
    </g>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#4CAF50" text-anchor="middle">Grammar Guru</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">The Wise Owl</text>
  </g>
  
  <!-- Row 2: Practice Pat, Creative Kai, Word Wizard -->
  
  <!-- Practice Pat -->
  <g transform="translate(150, 520)">
    <circle cx="0" cy="0" r="80" fill="#FFF3E0" opacity="0.4"/>
    <circle cx="0" cy="-30" r="35" fill="#D4A574"/>
    <g fill="#2C3E50">
      <ellipse cx="-15" cy="-52" rx="10" ry="15" transform="rotate(-20 -15 -52)"/>
      <ellipse cx="0" cy="-58" rx="10" ry="18"/>
      <ellipse cx="15" cy="-52" rx="10" ry="15" transform="rotate(25 15 -52)"/>
    </g>
    <rect x="-35" y="-43" width="70" height="6" fill="#FFD54F" rx="3"/>
    <circle cx="-12" cy="-33" r="5" fill="#2C3E50"/>
    <circle cx="12" cy="-33" r="5" fill="#2C3E50"/>
    <path d="M -12,-18 Q 0,-10 12,-18" stroke="#2C3E50" stroke-width="2" fill="none"/>
    <rect x="-25" y="5" width="50" height="50" fill="#FF5722" rx="5"/>
    <text x="0" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#FFD54F">1</text>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#FF5722" text-anchor="middle">Practice Pat</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">The Energy Star</text>
  </g>
  
  <!-- Creative Kai -->
  <g transform="translate(400, 520)">
    <circle cx="0" cy="0" r="80" fill="#F3E5F5" opacity="0.4"/>
    <circle cx="0" cy="-30" r="35" fill="#8D6E63"/>
    <g fill="#2C3E50">
      <ellipse cx="-18" cy="-52" rx="15" ry="22" transform="rotate(-25 -18 -52)"/>
      <ellipse cx="0" cy="-58" rx="15" ry="25"/>
      <ellipse cx="18" cy="-52" rx="15" ry="22" transform="rotate(30 18 -52)"/>
    </g>
    <ellipse cx="0" cy="-52" rx="32" ry="12" fill="#9C27B0"/>
    <path d="M -25,-48 Q -8,-38 5,-43" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-12" cy="-33" r="5" fill="#2C3E50"/>
    <circle cx="12" cy="-33" r="5" fill="#2C3E50"/>
    <polygon points="-12,-35 -11,-33 -9,-33 -10,-31 -10,-29 -12,-30 -14,-29 -14,-31 -15,-33 -13,-33" fill="#ffffff" opacity="0.8"/>
    <polygon points="12,-35 13,-33 15,-33 14,-31 14,-29 12,-30 10,-29 10,-31 9,-33 11,-33" fill="#ffffff" opacity="0.8"/>
    <path d="M -12,-20 Q 0,-12 12,-20" stroke="#2C3E50" stroke-width="2" fill="none"/>
    <rect x="-25" y="5" width="50" height="50" fill="#9C27B0" rx="5"/>
    <circle cx="-10" cy="25" r="4" fill="#FF5252" opacity="0.7"/>
    <circle cx="8" cy="35" r="5" fill="#FFD54F" opacity="0.7"/>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#9C27B0" text-anchor="middle">Creative Kai</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">Imagination Explorer</text>
  </g>
  
  <!-- Word Wizard -->
  <g transform="translate(650, 520)">
    <circle cx="0" cy="0" r="80" fill="#E8EAF6" opacity="0.4"/>
    <circle cx="0" cy="-30" r="35" fill="#A1887F"/>
    <g fill="#7E57C2">
      <ellipse cx="0" cy="-62" rx="40" ry="8"/>
      <path d="M -28,-62 Q 0,-115 28,-62 Z" fill="#7E57C2"/>
    </g>
    <polygon points="0,-100 1.5,-96 5,-96 2,-93 3,-89 0,-91 -3,-89 -2,-93 -5,-96 -1.5,-96" fill="#FFD54F"/>
    <circle cx="-12" cy="-33" r="5" fill="#7E57C2"/>
    <circle cx="12" cy="-33" r="5" fill="#7E57C2"/>
    <polygon points="-12,-35 -11,-33 -9,-33 -10,-31 -10,-29 -12,-30 -14,-29 -14,-31 -15,-33 -13,-33" fill="#ffffff" opacity="0.8"/>
    <polygon points="12,-35 13,-33 15,-33 14,-31 14,-29 12,-30 10,-29 10,-31 9,-33 11,-33" fill="#ffffff" opacity="0.8"/>
    <path d="M -15,-8 Q 0,-2 15,-8" stroke="#8D6E63" stroke-width="2" fill="none"/>
    <path d="M -15,-5 Q -12,5 0,7 Q 12,5 15,-5" fill="#BDBDBD"/>
    <rect x="-25" y="5" width="50" height="50" fill="#5E35B1" rx="5"/>
    <polygon points="-10,25 -9,28 -6,28 -8,30 -7,33 -10,31 -13,33 -12,30 -14,28 -11,28" fill="#FFD54F" opacity="0.7"/>
    <text x="0" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#7E57C2" text-anchor="middle">Word Wizard</text>
    <text x="0" y="130" font-family="Arial" font-size="13" fill="#666" text-anchor="middle">Vocabulary Master</text>
  </g>
  
  <!-- Key Features -->
  <g transform="translate(950, 220)">
    <rect x="0" y="0" width="220" height="350" rx="10" fill="#ffffff" stroke="#4A90E2" stroke-width="3"/>
    <text x="110" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="#2C3E50" text-anchor="middle">Meet the Team!</text>
    
    <text x="20" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#FF6B9D">✏️ Penny Pencil</text>
    <text x="25" y="88" font-family="Arial" font-size="11" fill="#666">Main guide & cheerleader</text>
    
    <text x="20" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#1976D2">📚 Booksy</text>
    <text x="25" y="133" font-family="Arial" font-size="11" fill="#666">Story keeper & reader</text>
    
    <text x="20" y="160" font-family="Arial" font-size="14" font-weight="bold" fill="#4CAF50">🦉 Grammar Guru</text>
    <text x="25" y="178" font-family="Arial" font-size="11" fill="#666">Wise grammar teacher</text>
    
    <text x="20" y="205" font-family="Arial" font-size="14" font-weight="bold" fill="#FF5722">⚡ Practice Pat</text>
    <text x="25" y="223" font-family="Arial" font-size="11" fill="#666">Energy & motivation</text>
    
    <text x="20" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#9C27B0">🎨 Creative Kai</text>
    <text x="25" y="268" font-family="Arial" font-size="11" fill="#666">Imagination & art</text>
    
    <text x="20" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#7E57C2">✨ Word Wizard</text>
    <text x="25" y="313" font-family="Arial" font-size="11" fill="#666">Vocabulary & magic</text>
    
    <text x="110" y="335" font-family="Arial" font-size="12" fill="#4A90E2" text-anchor="middle" font-weight="bold">6 friends for every pupil!</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="24" fill="#4A90E2" text-anchor="middle" font-weight="600">
    Making Writing Fun, One Story at a Time!
  </text>
  
  <!-- Copyright -->
  <text x="600" y="780" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">
    © 2025 WriFe Education | Original Mascot Designs
  </text>
</svg>