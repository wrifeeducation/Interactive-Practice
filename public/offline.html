<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WriFe — You're Offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #F5F7FA;
        color: #2C3E50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        text-align: center;
        box-sizing: border-box;
      }
      img { margin-bottom: 16px; }
      h1 { font-size: 24px; font-weight: 700; margin: 0 0 12px; }
      p { font-size: 16px; color: #666; margin: 0 0 24px; line-height: 1.5; }
      button {
        padding: 12px 28px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: #4A90E2;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        min-height: 44px;
      }
    </style>
  </head>
  <body>
    <img src="/mascots/penny-pencil.svg" alt="" role="presentation" width="120" height="150" />
    <h1>You're offline</h1>
    <p>Reconnect to the internet to continue practising with WriFe.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
